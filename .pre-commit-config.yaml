# ci-truth-serum dogfoods its own lints (plus ruff) on itself.
# Run with: `pre-commit run --all-files`.
#
# Consumers do NOT use this file — they reference the hooks in
# `.pre-commit-hooks.yaml` via `repo: https://github.com/alexander-turner/ci-truth-serum`
# (see the README). This local config wires the same lints to this repo's own
# sources so a regression turns `pre-commit` red here too.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: ruff format --force-exclude
        language: system
        types_or: [python, pyi]

      # ── Tier 1 · Honesty ──
      - id: check-workflow-pipefail
        name: check-workflow-pipefail
        entry: python -m hooks.check_workflow_pipefail
        language: system
        pass_filenames: false
        files: ^\.github/(workflows|actions)/
      - id: check-exit-suppression
        name: check-exit-suppression
        entry: python -m hooks.check_exit_suppression
        language: system
        types: [shell]
      - id: check-stderr-suppression
        name: check-stderr-suppression
        entry: python -m hooks.check_stderr_suppression
        language: system
        types: [shell]
      - id: check-pr-paths
        name: check-pr-paths
        entry: python -m hooks.check_pr_paths
        language: system
        pass_filenames: false
        files: ^\.github/(workflows|actions)/

      # ── Tier 1 · Identity ──
      - id: check-pinned-base-images
        name: check-pinned-base-images
        entry: python -m hooks.check_pinned_base_images
        language: system
        files: '(^|/)Dockerfile(\.[\w-]+)?$'
      - id: check-pinned-downloads
        name: check-pinned-downloads
        entry: python -m hooks.check_pinned_downloads
        language: system
        files: '\.(sh|bash)$|(^|/)Dockerfile(\.[\w-]+)?$'

      # ── Tier 2 · Opinionated ──
      - id: check-always-reporter
        name: check-always-reporter
        entry: python -m hooks.check_always_reporter
        language: system
        pass_filenames: false
        files: ^\.github/(workflows|actions)/
      - id: check-inline-run-length
        name: check-inline-run-length
        entry: python -m hooks.check_inline_run_length
        language: system
        pass_filenames: false
        files: ^\.github/(workflows|actions)/
      - id: check-concurrency
        name: check-concurrency
        entry: python -m hooks.check_concurrency
        language: system
        pass_filenames: false
        files: ^\.github/workflows/

      # ── Extras ──
      - id: check-symlinks
        name: check-symlinks
        entry: hooks/check_symlinks.sh
        language: script
        pass_filenames: false
      - id: check-unnamed-regex-groups
        name: check-unnamed-regex-groups
        entry: python -m hooks.check_unnamed_regex_groups
        language: system
        types: [python]
      # The stdio-swap lint is scoped to application source; this repo has none of
      # those surfaces, and its own detector source mentions the banned idioms in
      # prose, so it is not self-applied here (see check_global_stdio_swap.py).
