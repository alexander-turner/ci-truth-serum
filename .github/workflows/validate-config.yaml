name: Validate config
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Path gate: runs unconditionally so the validate-config-passed reporter always
  # reports, then opens only when config/hook/test sources change on a PR.
  decide:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/decide-reusable.yaml
    with:
      filters: |
        run:
          - '.claude/**'
          - '.hooks/**'
          - '.github/workflows/**'
          - 'tests/**'
          - 'pyproject.toml'
          - 'uv.lock'

  validate:
    needs: decide
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env
        with:
          setup-python: "true"

      - name: Validate configuration
        run: bash .github/scripts/validate-config.sh

      - name: Test Claude hooks
        run: uv run --extra dev pytest tests/

  # Stable Required check: runs even when `validate` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports.
  validate-config-passed: # required-check: true
    if: always()
    needs: [decide, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
