name: Mutation testing

# Mutation testing over the lint parsers (cosmic-ray, Python) and the changelog
# assembler (Stryker, JS). Both are slow — cosmic-ray reruns the whole offline
# suite once per mutant — so each job is change-gated via decide-reusable: on a
# PR it runs only when files it actually depends on changed, and a weekly
# schedule re-checks main. The mutation-passed reporter is an `if: always()`
# summary so it always concludes (even when the gates are closed), which lets it
# be a stable required status check. Concurrency is keyed per PR/ref so a
# superseded run goes red rather than stranding the required check.
#
# Gate semantics: run-mutation.sh fails only when the unmutated baseline is red
# or cosmic-ray errors — a surviving mutant is a prompt to add a test, not a
# build break — so "required" here means the mutation run completed cleanly, not
# that the score is perfect.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  pull_request:
  workflow_dispatch:
    inputs:
      hypothesis_profile:
        description: Hypothesis profile for the property suites (dev = fast).
        type: string
        default: dev

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Path gates: each runs unconditionally so the mutation-passed reporter always
  # receives a conclusion, then opens only when files the matching job depends on
  # change on a PR (always open on non-pull_request events).
  decide-py:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/decide-reusable.yaml
    with:
      filters: |
        run:
          - 'hooks/**'
          - 'tests/**'
          - 'cosmic-ray.toml'
          - 'pyproject.toml'
          - '.python-version'
          - '.github/scripts/run-mutation.sh'
          - '.github/workflows/mutation.yaml'
          - '.github/workflows/decide-reusable.yaml'

  decide-js:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/decide-reusable.yaml
    with:
      filters: |
        run:
          - 'scripts/assemble-changelog.mjs'
          - 'scripts/assemble-changelog.test.mjs'
          - 'stryker.config.json'
          - 'package.json'
          - 'pnpm-lock.yaml'
          - '.github/workflows/mutation.yaml'
          - '.github/workflows/decide-reusable.yaml'

  mutation:
    needs: decide-py
    if: needs.decide-py.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Keep in sync with .python-version / ci.yaml.
          python-version: "3.11"

      - name: Run mutation testing
        env:
          HYPOTHESIS_PROFILE: ${{ inputs.hypothesis_profile || 'dev' }}
        run: uv run --extra mutation bash .github/scripts/run-mutation.sh cr-session.sqlite

      - name: Upload mutation session
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cosmic-ray-session
          path: cr-session.sqlite
          if-no-files-found: warn

  # JS counterpart: Stryker over the self-contained scripts/assemble-changelog.mjs.
  mutation-js:
    needs: decide-js
    if: needs.decide-js.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run Stryker
        run: pnpm mutation

  # Stable Required check: runs even when the gates close or a job is
  # cancelled/skipped, so a protected branch never gets stuck on a check that
  # never reports.
  mutation-passed: # required-check: true
    if: always()
    needs: [decide-py, decide-js, mutation, mutation-js]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
