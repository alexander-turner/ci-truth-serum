name: CI

on:
  push:
    branches: [main]
  pull_request:

# Make the cancellation policy explicit (dogfoods check-concurrency).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"
      - name: Lint (ruff)
        run: uv run --extra dev ruff check hooks tests/cts
      - name: Format check (ruff)
        run: uv run --extra dev ruff format --check hooks tests/cts
      - name: Tests (pytest)
        run: uv run --extra dev pytest tests/cts -n auto -q

  # Stable Required check: runs even when `test` is cancelled, so a protected
  # branch never gets stuck on a check that never reports.
  ci-passed: # required-check: true
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
