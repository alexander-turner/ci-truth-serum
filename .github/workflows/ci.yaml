name: CI

on:
  push:
    branches: [main]
  pull_request:

# Make the cancellation policy explicit (dogfoods check-concurrency).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          python-version: "3.11"
      - name: Lint (ruff)
        run: uv run --extra dev ruff check hooks tests/cts
      - name: Format check (ruff)
        run: uv run --extra dev ruff format --check hooks tests/cts
      - name: Tests (pytest)
        run: uv run --extra dev pytest tests/cts -n auto -q
