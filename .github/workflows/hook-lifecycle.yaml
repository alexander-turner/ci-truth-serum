name: Hook lifecycle

# Runs the full Claude hook lifecycle (session setup -> pre-commit -> pre-push)
# on a clean checkout, so a broken hook is caught in CI rather than in a session.

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Path gate: runs unconditionally so the hook-lifecycle-passed reporter always
  # reports, then opens only when hook/setup/dependency sources change on a PR.
  decide:
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/decide-reusable.yaml
    with:
      filters: |
        run:
          - '.claude/hooks/**'
          - '.hooks/**'
          - 'setup.sh'
          - 'package.json'
          - 'pnpm-lock.yaml'
          - 'pyproject.toml'
          - 'uv.lock'
          - '.pre-commit-config.yaml'
          - '.github/scripts/run-hook-lifecycle.sh'
          - '.github/workflows/hook-lifecycle.yaml'
          - '.github/workflows/decide-reusable.yaml'

  hook-lifecycle:
    needs: decide
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env
        with:
          setup-python: "true"

      - name: Run hook lifecycle
        run: bash .github/scripts/run-hook-lifecycle.sh

  # Stable Required check: runs even when `hook-lifecycle` is cancelled/skipped,
  # so a protected branch never gets stuck on a check that never reports.
  hook-lifecycle-passed: # required-check: true
    if: always()
    needs: [decide, hook-lifecycle]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
